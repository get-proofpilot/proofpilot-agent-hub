# Adam Levinstein Photography — Monthly Recurring Tasks
# Source: context.md + tier/cadence specs
# This template repeats every month. /monthly-plan reads this to generate the task list.
# Each task has an owner (internal = Jo/Marcos, outsource = contractor)
# Note: Tier 3, lowest retainer ($800). Keep scope lean.

client: Adam Levinstein Photography
cadence: monthly

content:
  - task: Write and publish 1 blog post
    owner: internal
    time: 1 hour
    source: "Pull next HIGH priority from blogs_pipeline in roadmap.yaml"
    notes: Wedding/event photography topics. OC and San Diego geo targeting.

gbp:
  - task: Post and schedule 4 Google Business Posts
    owner: internal
    time: 30 min
    notes: 1 post per week. Showcase recent shoots, seasonal wedding content.

  - task: GBP review responses (up to 5)
    owner: internal
    time: 15 min
    notes: Currently 30 Google reviews. Encourage new reviews when possible.

off_page:
  - task: Continue citation buildout (15-20 citations)
    owner: outsource
    notes: Fiverr or in-house link builder. Photography-specific directories.

  - task: 2 Pinterest pins
    owner: internal
    time: 15 min
    notes: Pin portfolio images. Wedding/event boards.

  - task: 1 Reddit post or engagement
    owner: internal
    time: 15 min
    notes: Previous Reddit post got 3,000 views. Target wedding planning, OC, San Diego subreddits.

  - task: Image sharing and geo-tagging (15 images)
    owner: outsource

technical:
  - task: Submit all links to indexing tool
    owner: internal
    time: 10 min

reporting:
  - task: Create and deliver monthly report
    owner: internal
    time: 30 min
    notes: Starting month 5+. Keep lightweight for Tier 3.
