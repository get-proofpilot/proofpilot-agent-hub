# Adam Levinstein Photography — SEO Roadmap
# Source: Client context + tracker gap analysis + existing page inventory
# This is the strategic pipeline. /monthly-plan reads this to know WHAT to build next.
# Statuses: needed | in-progress | live | skipped
# Tier 3 ($1K/month) — LEAN scope: 1 page + 1 blog per month

# ──────────────────────────────────────
# 2026 TARGETS
# ──────────────────────────────────────
targets:
  baseline_mar_2026:
    pages: 36
    keywords_ranking: 18
    keywords_top_10: 3
    google_reviews: 30
    leads_per_month: 8
    avg_booking_value: 3500
