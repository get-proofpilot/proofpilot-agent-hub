# Pelican Coast Electric — Monthly Recurring Tasks
# Source: SEO Deliverables template, adapted for PCE
# This template repeats every month. /monthly-plan reads this to generate the task list.
# Each task has an owner (internal = Marcos/Jo, outsource = contractor)

client: Pelican Coast Electric
cadence: monthly
manager: Marcos

content:
  - task: Write and publish 4 blog posts
    owner: internal
    time: 4 hours
    source: "Pull next 4 HIGH priority from blogs_pipeline in roadmap.yaml"
    notes: Aggressive pace to close 226-post gap vs Express Electrical. Use Zimmwriter or Claude Code /home-service-seo-content skill.

  - task: Create location pages and optimize (5-7 cities)
    owner: internal
    time: 4 hours
    source: "Pull next HIGH priority cities from pages_pipeline in roadmap.yaml"
    notes: 31 missing OC cities identified. Target 5-7 per month to complete in 5 months.

  - task: Create and optimize service sub-pages (3-4)
    owner: internal
    time: 4 hours
    source: "Pull next HIGH priority sub-service pages from roadmap.yaml"
    notes: Generator sub-pages first, then panel and EV charger pages.

gbp:
  - task: Post and schedule 8 Google Business Posts
    owner: internal
    time: 1 hour
    notes: 2 posts per week. Generator content should be 40%+ of posts.

  - task: GBP review responses (up to 10)
    owner: internal
    time: 30 min
    notes: Use ChatGPT for drafting

off_page:
  - task: Continue citation buildout (60 citations)
    owner: outsource
    notes: Fiverr or in-house link builder

  - task: Image sharing and geo-tagging (60 images)
    owner: outsource

  - task: 5 niche blog comment backlinks
    owner: outsource

  - task: 100-500 map embed distribution
    owner: outsource
    notes: Legiit - SerpHaus

  - task: 4 Pinterest pins
    owner: internal
    time: 30 min

  - task: 2 optimized Patch posts
    owner: internal
    time: 30 min

  - task: 1 YouTube video (slideshow or website walkthrough)
    owner: internal
    time: 30 min

  - task: 1 press release writing and distribution
    owner: internal
    notes: Signal Genysis or White Label SEO Firm

  - task: Niche and local signals (60 min)
    owner: outsource

technical:
  - task: Submit all links to indexing tool
    owner: internal
    time: 15 min

  - task: Pull heat maps bi-weekly for tracking and reporting
    owner: internal
    time: 30 min
    notes: Local Dominator geo grids

reporting:
  - task: Create and deliver monthly report
    owner: internal
    time: 1 hour
    notes: Austin is impatient — include traffic, keyword, and lead metrics with clear month-over-month trends.
